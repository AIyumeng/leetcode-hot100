<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <title>LeetCode Hot 100 复盘系统</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    select,
    button {
      padding: 4px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 10px;
    }

    th,
    td {
      border: 1px solid #ccc;
      padding: 6px;
      vertical-align: top;
    }

    textarea {
      width: 100%;
      height: 60px;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .progress span {
      margin-right: 12px;
    }
  </style>
</head>

<body>

  <h1>LeetCode Hot 100 · 5 天刷题复盘</h1>

  <div class="toolbar">
    <label>选择 Day：
      <select id="daySelect"></select>
    </label>
    <div class="progress" id="progress"></div>
    <button onclick="exportMarkdown()">导出 Markdown</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>题号</th>
        <th>题目</th>
        <th>状态</th>
        <th>复盘记录</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <script>
    const STATUS = ["未开始", "进行中", "已完成", "已掌握"];
    // 这是 Hot100 按题号升序后的列表（来自公开整理）:contentReference[oaicite:1]{index=1}
    const ALL = [
      [1, "Two Sum"], [2, "Add Two Numbers"], [3, "Longest Substring Without Repeating Characters"],
      [4, "Median of Two Sorted Arrays"], [5, "Longest Palindromic Substring"],
      [10, "Regular Expression Matching"], [11, "Container With Most Water"], [15, "3Sum"],
      [17, "Letter Combinations of a Phone Number"], [19, "Remove Nth Node From End of List"], [20, "Valid Parentheses"],
      [21, "Merge Two Sorted Lists"], [22, "Generate Parentheses"], [23, "Merge k Sorted Lists"],
      [31, "Next Permutation"],
      [32, "Longest Valid Parentheses"], [33, "Search in Rotated Sorted Array"], [34, "Find First and Last Position of Element"],
      [39, "Combination Sum"],
      [42, "Trapping Rain Water"], [46, "Permutations"], [48, "Rotate Image"],
      [49, "Group Anagrams"], [53, "Maximum Subarray"], [55, "Jump Game"],
      [56, "Merge Intervals"], [62, "Unique Paths"], [64, "Minimum Path Sum"],
      [70, "Climbing Stairs"], [72, "Edit Distance"], [75, "Sort Colors"], [76, "Minimum Window Substring"],
      [78, "Subsets"], [79, "Word Search"], [84, "Largest Rectangle in Histogram"],
      [85, "Maximal Rectangle"],
      [94, "Binary Tree Inorder Traversal"], [96, "Unique Binary Search Trees"], [98, "Validate Binary Search Tree"],
      [101, "Symmetric Tree"], [102, "Binary Tree Level Order Traversal"], [104, "Maximum Depth of Binary Tree"],
      [105, "Construct Binary Tree"], [114, "Flatten Binary Tree to Linked List"], [121, "Best Time to Buy and Sell Stock"],
      [124, "Binary Tree Maximum Path Sum"], [128, "Longest Consecutive Sequence"], [136, "Single Number"],
      [139, "Word Break"], [141, "Linked List Cycle"], [142, "Linked List Cycle II"],
      [146, "LRU Cache"], [148, "Sort List"], [152, "Maximum Product Subarray"],
      [155, "Min Stack"], [160, "Intersection of Two Linked Lists"], [169, "Majority Element"],
      [198, "House Robber"], [200, "Number of Islands"],
      [206, "Reverse Linked List"], [207, "Course Schedule"], [208, "Implement Trie (Prefix Tree)"],
      [215, "Kth Largest Element in an Array"], [221, "Maximal Square"], [226, "Invert Binary Tree"],
      [234, "Palindrome Linked List"], [236, "Lowest Common Ancestor of a Binary Tree"],
      [238, "Product of Array Except Self"], [239, "Sliding Window Maximum"], [240, "Search a 2D Matrix II"],
      [253, "Meeting Rooms II"],
      [279, "Perfect Squares"], [283, "Move Zeroes"], [287, "Find the Duplicate Number"],
      [297, "Serialize and Deserialize Binary Tree"], [300, "Longest Increasing Subsequence"],
      [301, "Remove Invalid Parentheses"], [309, "Best Time to Buy and Sell Stock with Cooldown"],
      [312, "Burst Balloons"], [322, "Coin Change"], [337, "House Robber III"],
      [338, "Counting Bits"], [347, "Top K Frequent Elements"], [394, "Decode String"],
      [399, "Evaluate Division"], [406, "Queue Reconstruction by Height"], [416, "Partition Equal Subset Sum"],
      [437, "Path Sum III"], [438, "Find All Anagrams in a String"], [448, "Find All Numbers Disappeared in an Array"],
      [461, "Hamming Distance"], [494, "Target Sum"], [538, "Convert BST to Greater Tree"],
      [543, "Diameter of Binary Tree"], [560, "Subarray Sum Equals K"], [581, "Shortest Unsorted Continuous Subarray"],
      [617, "Merge Two Binary Trees"], [621, "Task Scheduler"], [647, "Palindromic Substrings"],
      [739, "Daily Temperatures"],
    ];

    // 划分成 5 天 × 20 题
    const DAYS = {
      "Day 1": ALL.slice(0, 20),
      "Day 2": ALL.slice(20, 40),
      "Day 3": ALL.slice(40, 60),
      "Day 4": ALL.slice(60, 80),
      "Day 5": ALL.slice(80, 100)
    };

    const daySelect = document.getElementById('daySelect');
    const tbody = document.getElementById('tbody');
    const progressDiv = document.getElementById('progress');

    Object.keys(DAYS).forEach(d => {
      const opt = document.createElement('option');
      opt.value = d; opt.textContent = d;
      daySelect.appendChild(opt);
    });

    function key(day, id, type) { return `${day}_${type}_${id}` }

    function render() {
      const day = daySelect.value;
      tbody.innerHTML = '';
      let cnt = { "未开始": 0, "进行中": 0, "已完成": 0, "已掌握": 0 };

      DAYS[day].forEach(([id, title]) => {
        const state = localStorage.getItem(key(day, id, 'state')) || '未开始';
        const note = localStorage.getItem(key(day, id, 'note')) || '';
        cnt[state]++;

        const tr = document.createElement('tr');
        tr.innerHTML = `
      <td>${id}</td>
      <td>${title}</td>
      <td>
        <select>
          ${STATUS.map(s => `<option ${s === state ? 'selected' : ''}>${s}</option>`).join('')}
        </select>
      </td>
      <td><textarea>${note}</textarea></td>
    `;
        tr.querySelector('select').onchange = e => {
          localStorage.setItem(key(day, id, 'state'), e.target.value);
          render();
        };
        tr.querySelector('textarea').oninput = e => {
          localStorage.setItem(key(day, id, 'note'), e.target.value);
        };
        tbody.appendChild(tr);
      });

      progressDiv.innerHTML = `
    <span>⭐ 已掌握：${cnt['已掌握']}</span>
    <span>🟢 已完成：${cnt['已完成']}</span>
    <span>🟡 进行中：${cnt['进行中']}</span>
    <span>⭕ 未开始：${cnt['未开始']}</span>`;
    }

    daySelect.onchange = render;
    daySelect.value = 'Day 1';
    render();

    function exportMarkdown() {
      const map = { '未开始': '⭕', '进行中': '🟡', '已完成': '🟢', '已掌握': '⭐' };
      let md = '# LeetCode Hot100 复盘\n\n';
      Object.keys(DAYS).forEach(day => {
        md += `## ${day}\n\n| 题号 | 题目 | 状态 | 复盘 |\n|---|---|---|---|\n`;
        DAYS[day].forEach(([id, title]) => {
          const state = map[localStorage.getItem(key(day, id, 'state'))] || '⭕';
          const note = (localStorage.getItem(key(day, id, 'note')) || '').replace(/\n/g, ' ');
          md += `| ${id} | ${title} | ${state} | ${note} |\n`;
        });
        md += '\n';
      });
      const blob = new Blob([md], { type: 'text/markdown' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'hot100.md';
      a.click();
    }
  </script>

</body>

</html>
